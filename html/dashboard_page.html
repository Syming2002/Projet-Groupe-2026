<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard_page.css">
    <script src="/js/dashboard.js" defer></script>
</head>
<body>
    <div class="container-div">
        <aside class="sidebar">
            <h1 class="ice-text main-title">Job Handler</h1>
            <div>
                <h2 class="ice-text filter-title">Trier par:</h2>
                <div class="filter-div">
                    <select name="statut" id="statut-select" class="ice-button">
                        <option value="statut">
                            Statut
                        </option>
                        <option value="accepted">
                            Accepté
                        </option>
                        <option value="loading">
                            En Cours
                        </option>
                        <option value="rejected">
                            Rejeté
                        </option>
                    </select>
                    <select name="post" id="post-select" class="ice-button">
                        <option value="post">
                            Poste
                        </option>
                    </select>
                    <select name="company" id="company-select" class="ice-button">
                        <option value="company">
                            Entreprise
                        </option>
                    </select>
                    <select name="date-send" id="date-send-select" class="ice-button">
                        <option value="date-send">
                            Date d'envoi
                        </option>
                    </select>
                    <select name="date-resend" id="date-resend-select" class="ice-button">
                        <option value="date-resend">
                            Date de relance
                        </option>
                    </select>
                    <button type="button" id="apply" class="ice-button">Appliquer</button>
                    <button class="logout-button ice-button">
                        Déconnexion
                    </button>
                    <a href="/html/user_page.html">
                        <i class="fa-solid fa-user">
                            
                        </i>
                    </a>
                </div>
            </div>
        </aside>
        <div class="content-div">
            <div class="extra-button-div">
                <i class="fa-solid fa-bars" onclick="onBurgerButtonClick()">
                    
                </i>
                <i class="fa-solid fa-universal-access">
                
                </i>
            </div>
            <div id="div-col">
                <div class="track-div">
                    <div>
                        <h3 class="ice-text track-text">Mes suivis</h3>
                        <div class="ice-div">
                        
                        </div>
                        <div class="add-track-div">
                            <h4 class="ice-text add-track-title">Ajouter un suivi</h4>
                            <button type="button" class="ice-add-button" onclick="onAddTrackButtonClick()">+</button>
                        </div>
                    </div>
                </div>
                <div class="form-div">
                    <form class="track-form">
                        <h4 class="create-track-title ice-text">Créer un suivi</h4>
                        <div class="form-container">
                            <div class="input-container">
                                <div id="statut-div">
                                    <label for="" class="ice-text">Statut</label>
                                    <select required name="" id="statut-input" class="ice-button-form">
                                        <option value="statut">
                                            Statut
                                        </option>
                                        <option value="accepted">
                                            Acceptée
                                        </option>
                                        <option value="loading">
                                            En attente
                                        </option>
                                        <option value="rejected">
                                            Refusée
                                        </option>
                                    </select>
                                </div>
                                <div id="post-div">
                                    <label for="" class="ice-text">Poste</label>
                                    <input required name="" id="post-input" class="ice-button-form"/>
                                </div>
                                <div id="company-div">
                                    <label for="" class="ice-text">Entreprise</label>
                                    <input required name="" id="company-input" class="ice-button-form"/>
                                </div>
                                <div id="date-send-div">
                                    <label for="date-send-form" class="ice-text">Date d'envoi</label>
                                    <input required type="date" name="date-send-input" id="date-send-input" class="ice-button-form">
                                </div>
                                <div id="date-resend-div">
                                    <label for="date-resend-form" class="ice-text">Date de relance</label>
                                    <input type="date" name="date-resend-input" id="date-resend-input" class="ice-button-form">
                                </div>
                            </div>
                            <div class="create-button">
                                <button type="submit" class="ice-button-form">
                                    Créer le suivi
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
