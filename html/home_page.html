<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page de connexion</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/home_page.css" />
  </head>
  <body>
    <main>
      <div class="container-div">
        <aside class="sidebar">
          <h1 class="ice-text main-title">Job Handler</h1>
          <div class="connect-button">
            <h2 class="ice-text filter-title">Bienvenue</h2>
            <div class="filter-div">
              
              <button class="ice-button">Inscription</button>
              <button class="ice-button">Connexion</button>
              <i class="fa-solid fa-user"> </i>
            </div>
          </div>
        </aside>
      </div>
      <div id="home-login">
        <div>
          <h1>S'inscrire</h1>
        </div>
        <div>
          <div><label>Nom</label><input placeholder="   Nom" /></div>
          <div><label>Prénom</label><input placeholder="   Prénom" /></div>
          <div><label>Email</label><input placeholder="   Email" /></div>
          <div>
            <label>Mot de passe</label><input placeholder="   Mot de passe" />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
